{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'platformpathapp/css/station_map.css' %}">
</head>

<body>
    <div class="main">
        <h1 id="diagram-name"></h1>
        <div class="layer-bar" aria-label="Station map layers">
            <span class="layer-bar-label">Layers</span>
            <div id="layer-options" class="layer-options"></div>
        </div>
        <div class="diagram-card">
            <div id="diagram-container">
            <!-- SVG loads here -->
            </div>
        </div>


        <div id="route-form" style="margin: 20px 0;">
            <label for="start-node">Start:</label>
            <select id="start-node">
            </select>

            <label for="end-node">End:</label>
            <select id="end-node">
            </select>

            <button id="find-route">Find Route</button>
        </div>

        <div id="step-ui" style="display: none; margin: 20px 0; padding: 10px; background: #eee;">
            <button id="btn-prev">Previous</button>
            <strong id="instruction-text" style="margin: 0 20px;">Instructions will appear here</strong>
            <button id="btn-next">Next</button>
        </div>
    </div>

    <script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
    <script type="module" src="{% static 'platformpathapp/js/station_map.js' %}"></script>

</body>

</html>
