{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'platformpathapp/css/station_map.css' %}">
</head>

<body>
	<!-- ================= HEADER (fixed / absolutely positioned nav bar) ================= -->
	<header class="site-header">
		<div class="site-header__inner">
			<a class="brand" href="#">
					<img class="brand__logo" src="{% static 'platformpathapp/decals/mta_logo.png' %}" alt="MTA">
					<span class="brand__name">PLATFORMPATH</span>
			</a>
			<nav class="site-header__nav">
					<a href="/not-found">ABOUT US</a>
					<a href="/">HOME</a>
					<a href="/not-found">NAVIGATE</a>
			</nav>
		</div>
	</header>

		<!-- ================= HEADER SPACING ================= -->
	<div class="header-spacer"></div>

	<main class="station-map-page">
		<section class="station-map-stage" aria-label="Station map">
				<div id="diagram-container">
						<!-- SVG loads here -->
				</div>

				<header class="map-overlay map-header">
						<h1 id="diagram-name"></h1>
				</header>

				<aside class="map-overlay level-stack" aria-label="Station levels">
						<button id="show-all-layers" class="all-layers-button active" type="button">
							SHOW ALL LEVELS
						</button>
						
						<div class="level-rail">
								<p class="level-boundary">TOP LEVEL ↑</p>
								<div id="layer-options" class="layer-options"></div>
								<p class="level-boundary">BOTTOM LEVEL ↓</p>
						</div>
				</aside>

				<div class="map-overlay route-form-filter-checkbox__container">
					<div class="filter-checkbox" aria-label="Checkbox for various filters on the nodes">
					</div>
					<div id="route-form" class="route-form">
							<div class="route-field">
									<label for="start-node-dropdown">START</label>
									<select id="start-node-dropdown" required>
											<option value="" selected disabled>Choose a start node</option>
									</select>
							</div>

							<div class="route-field">
									<label for="end-node-dropdown">END</label>
									<select id="end-node-dropdown" required>
											<option value="" selected disabled>Choose an end node</option>
									</select>
							</div>

							<button id="find-route" type="button">Find Route</button>
					</div>
				</div>

				<div id="step-ui" class="map-overlay step-ui" style="display: none;">
						<strong id="instruction-text">Instructions will appear here</strong>
						<div class="step-controls">
								<button id="btn-prev" type="button">Previous</button>
								<button id="btn-next" type="button">Next</button>
						</div>
				</div>
		</section>
	</main>

	<!-- ================= FOOTER ================= -->
	<footer class="site-footer">
		<div class="brand brand--footer">
			<img class="brand__logo brand__logo--sm" src="{% static 'platformpathapp/decals/mta_logo.png' %}" alt="MTA">
			<span class="brand__name brand__name--sm">PLATFORMPATH</span>
		</div>
		<div class="site-footer__legal">
			<span>2026 All rights reserved.</span>
			<span class="site-footer__disclaimer">DISCLAIMER: Maps are not 100% accurate and are subject to updates.</span>
		</div>
	</footer>

	<script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
	<script type="module" src="{% static 'platformpathapp/js/app.js' %}"></script>

</body>

</html>
