{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'platformpathapp/css/stations_selection.css' %}">
</head>
<body>
	<!-- ================= HEADER (fixed / absolutely positioned nav bar) ================= -->
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="#">
        <img class="brand__logo" src="{% static 'platformpathapp/decals/mta_logo.png' %}" alt="MTA">
        <span class="brand__name">PLATFORMPATH</span>
      </a>
      <nav class="site-header__nav">
				<a href="#about">ABOUT US</a>
				<a href="/alternative_index">HOME</a>
        <a href="#navigate">NAVIGATE</a>
      </nav>
    </div>
  </header>

	<div class="header-spacer"></div>

	<main class="page">
		<section class="user-prompt">
			SELECT A STATION
		</section>

		<div class="divider"></div>

		<section class="stations__selection">
			<button class="stations__direction"></button>
			<div id="stations_user_selection" class="stations__user-selection">
				<div class="logo-input__container">
					<div id="logo" class="logo"></div>
					<input>
				</div>
				<ol class="stations-list">
				</ol>
			</div>
		</section>
	</main>

	<!-- ================= FOOTER ================= -->
  <footer class="site-footer">
    <div class="brand brand--footer">
      <img class="brand__logo brand__logo--sm" src="{% static 'platformpathapp/decals/mta_logo.png' %}" alt="MTA">
      <span class="brand__name brand__name--sm">PLATFORMPATH</span>
    </div>
    <div class="site-footer__legal">
      <span>2026 All rights reserved.</span>
      <span class="site-footer__disclaimer">DISCLAIMER: Maps are not 100% accurate and are subject to updates.</span>
    </div>
  </footer>

	<script type="module" src="{% static 'platformpathapp/js/app_new.js'%}"></script>
</body>
</html>
