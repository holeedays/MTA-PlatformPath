{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'platformpathapp/css/lines_selection.css' %}">
    <title>Document</title>
</head>
<body>
	<!-- ================= HEADER (fixed / absolutely positioned nav bar) ================= -->
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="#">
        <img class="brand__logo" src="{% static 'platformpathapp/decals/mta_logo.png' %}" alt="MTA">
        <span class="brand__name">PLATFORMPATH</span>
      </a>
      <nav class="site-header__nav">
				<a href="/not-found">ABOUT US</a>
				<a href="/">HOME</a>
				<a href="/not-found">NAVIGATE</a>
      </nav>
    </div>
  </header>

	<!-- ================= HEADER SPACE (prevents the header from overlapping with the content below) ================= -->
	<div class="header-spacer"></div>

	<main class="page">
		<section class="user-prompt">
			SELECT A LINE
		</section>

		<div class="divider"></div>

		<section class="notification-bar">
			<div class="notification-bar__unavailable-line">
				<img class="unavailable-line__logo" src="{% static 'platformpathapp/decals/unavailable_line_logo.svg' %}" alt="unavailable_line_indicator">
				<div class="unavailable-line__description"> Lines with this symbol are currently unavailable. We will add them soon as possible. </div>
			</div>
		</section>

		<!-- ================= SUBWAY LINE SELECTION ================= -->
		<section class="lines__master-container">
			<div class="lines__macro-group-container">
				<div class="lines__group-container">
					<div class="line__container" data-line="1">
						<button>1</button>
					</div>
					<div class="line__container" data-line="2">
						<button>2</button>
					</div>
					<div class="line__container" data-line="3">
						<button>3</button>
					</div>
				</div>

				<div class="lines__group-container">
					<div class="line__container" data-line="4">
						<button>4</button>
					</div>
					<div class="line__container" data-line="5">
						<button>5</button>
					</div>
					<div class="line__container" data-line="6">
						<button>6</button>
					</div>
				</div>

				<div class="lines__group-container">
					<div class="line__container" data-line="7">
						<button>7</button>
					</div>
				</div>
			</div>

			<div class="lines__macro-group-container">
				<div class="lines__group-container">
					<div class="line__container" data-line="A">
						<button>A</button>
					</div>
					<div class="line__container" data-line="C">
						<button>C</button>
					</div>
					<div class="line__container" data-line="E">
						<button>E</button>
					</div>
				</div>

				<div class="lines__group-container">
					<div class="line__container" data-line="B">
							<button>B</button>
					</div>
					<div class="line__container" data-line="D">
							<button>D</button>
					</div>
					<div class="line__container" data-line="F">
							<button>F</button>
					</div>
					<div class="line__container" data-line="M">
							<button>M</button>
					</div>
				</div>

				<div class="lines__group-container">
					<div class="line__container" data-line="N"> 
						<button>N</button>
					</div>
					<div class="line__container" data-line="Q">
						<button>Q</button>
					</div>
					<div class="line__container" data-line="R">
						<button>R</button>
					</div>
					<div class="line__container" data-line="W">
						<button>W</button>
					</div>
				</div>
			</div>
			
			<div class="lines__macro-group-container">
				<div class="lines__group-container">
					<div class="line__container" data-line="J">
						<button>J</button>
					</div>
					<div class="line__container" data-line="Z">
						<button>Z</button>
					</div>
				</div>

				<div class="lines__group-container">
					<div class="line__container" data-line="G"> 
						<button>G</button>
					</div>
				</div>

				<div class="lines__group-container">
						<div class="line__container" data-line="L">
								<button>L</button>
						</div>
				</div>

				<div class="lines__group-container">
					<div class="line__container" data-line="S"> 
						<button>S</button>
					</div>
				</div>
			</div>
		</section>
	</main>

	<!-- ================= FOOTER ================= -->
  <footer class="site-footer">
    <div class="brand brand--footer">
      <img class="brand__logo brand__logo--sm" src="{% static 'platformpathapp/decals/mta_logo.png' %}" alt="MTA">
      <span class="brand__name brand__name--sm">PLATFORMPATH</span>
    </div>
    <div class="site-footer__legal">
      <span>2026 All rights reserved.</span>
      <span class="site-footer__disclaimer">DISCLAIMER: Maps are not 100% accurate and are subject to updates.</span>
    </div>
  </footer>

	<div id="django_config" data-static-path="{% static '' %}"></div>
	<script type="module" src="{% static 'platformpathapp/js/app.js'%}"></script>
</body>
</html>
